# NGS-Hyper: Factorized routing, Hypernetwork storage, ContinuousDensity topology, PreAlloc memory
# Parameter efficiency sweet spot - generates adapters from compact codes
experiment: split_mnist
scenario: class_incremental
n_tasks: 5
classes_per_task: 2
input_dim: 784
output_dim: 10

model:
  latent_dim: 32
  k_init: 128
  max_k: 512
  top_k: 8
  routing: factorized_subspace
  parameter_storage: hypernetwork_generated
  topology_control: continuous_density
  memory_management: pre_allocated
  num_subspaces: 4
  top_k_factorized: 2
  hypernetwork_code_dim: 8
  hypernetwork_hidden_dim: 16
  split_threshold: 0.05
  prune_threshold: 0.01

training:
  lr: 0.001
  weight_decay: 0.0001
  epochs_per_task: 2
  batch_size: 256
  replay_size: 50000
  replay_ratio: 1.0
  kd_weight: 10.0
  kd_temperature: 2.0
  entropy_weight: 0.01
  diversity_weight: 0.01
  adapt_every_epoch: true
