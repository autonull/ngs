classes_per_task: 2
dataset: split_mnist
device: cuda
experiment: Split-MNIST
input_dim: 784
model:
  hypernetwork_code_dim: 8
  k_init: 128
  latent_dim: 32
  max_k: 512
  memory_management: pre_allocated
  num_subspaces: 4
  parameter_storage: direct_adapter
  prune_threshold: 0.01
  routing: factorized_subspace
  split_threshold: 0.05
  top_k: 8
  topology_control: discrete_heuristic
n_tasks: 5
output_dim: 10
scenario: class_incremental
seeds:
- 42
- 123
- 456
training:
  adapt_every_epoch: true
  batch_size: 256
  diversity_weight: 0.01
  entropy_weight: 0.01
  epochs_per_task: 2
  kd_temperature: 2.0
  kd_weight: 10.0
  lr: 0.001
  replay_ratio: 1.0
  replay_size: 50000
  weight_decay: 0.0001
